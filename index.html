<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  margin:0;
  background:#0a0a0a;
  color:white;
  text-align:center;
  font-family:sans-serif;
}

h2{margin:10px;}

canvas{
  width:90vw;
  max-width:420px;
  height:90vw;
  max-height:420px;
  background:#000;
  border-radius:12px;
  box-shadow:0 0 25px rgba(0,255,150,0.2);
}
</style>
</head>
<body>

<h2>🐍 Score: <span id="score">0</span></h2>
<canvas id="game" width="400" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const size = 20;
const tiles = 20;

let snake, dir, nextDir, food;
let score = 0;
let speed = 6;

let lastTime = 0;
let acc = 0;

// ===== INIT =====
function init(){
  snake = [{x:10,y:10}];
  dir = {x:1,y:0};
  nextDir = dir;
  food = spawnFood();
  score = 0;
  speed = 6;
  document.getElementById("score").innerText = score;
}

// ===== FOOD =====
function spawnFood(){
  return {
    x:Math.floor(Math.random()*tiles),
    y:Math.floor(Math.random()*tiles),
    pulse:0
  };
}

// ===== UPDATE =====
function update(){
  dir = nextDir;

  let head = {
    x: snake[0].x + dir.x,
    y: snake[0].y + dir.y
  };

  // 🔥 WRAP-AROUND (OG FEATURE)
  if(head.x < 0) head.x = tiles - 1;
  if(head.x >= tiles) head.x = 0;
  if(head.y < 0) head.y = tiles - 1;
  if(head.y >= tiles) head.y = 0;

  // self collision
  for(let s of snake){
    if(s.x === head.x && s.y === head.y){
      return gameOver();
    }
  }

  snake.unshift(head);

  // eat food
  if(head.x === food.x && head.y === food.y){
    score++;
    document.getElementById("score").innerText = score;
    food = spawnFood();

    // increase speed slightly
    if(speed < 12) speed += 0.3;
  } else {
    snake.pop();
  }
}

// ===== DRAW =====
function draw(interp){
  ctx.clearRect(0,0,400,400);

  // grid
  ctx.strokeStyle="rgba(255,255,255,0.04)";
  for(let i=0;i<tiles;i++){
    ctx.beginPath();
    ctx.moveTo(i*size,0);
    ctx.lineTo(i*size,400);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0,i*size);
    ctx.lineTo(400,i*size);
    ctx.stroke();
  }

  // snake smooth
  snake.forEach((s,i)=>{
    let prev = snake[i+1] || s;

    let x = (prev.x + (s.x - prev.x)*interp) * size;
    let y = (prev.y + (s.y - prev.y)*interp) * size;

    ctx.fillStyle = `hsl(${120+i*5},100%,50%)`;
    ctx.fillRect(x+2,y+2,size-4,size-4);
  });

  // food glow + pulse
  food.pulse += 0.1;
  let scale = 1 + Math.sin(food.pulse)*0.2;

  ctx.shadowBlur = 15;
  ctx.shadowColor = "red";
  ctx.fillStyle="red";

  ctx.fillRect(
    food.x*size + (size*(1-scale))/2,
    food.y*size + (size*(1-scale))/2,
    size*scale,
    size*scale
  );

  ctx.shadowBlur = 0;
}

// ===== GAME LOOP =====
function gameLoop(time){
  let delta = (time - lastTime)/1000;
  lastTime = time;
  acc += delta;

  let step = 1/speed;

  while(acc > step){
    update();
    acc -= step;
  }

  draw(acc/step);
  requestAnimationFrame(gameLoop);
}

// ===== GAME OVER =====
function gameOver(){
  init(); // restart instantly (OG style)
}

// ===== INPUT =====
function setDir(x,y){
  if(x === -dir.x && y === -dir.y) return;
  nextDir = {x,y};
}

// keyboard
document.addEventListener("keydown", e=>{
  if(e.key==="ArrowUp"||e.key==="w") setDir(0,-1);
  if(e.key==="ArrowDown"||e.key==="s") setDir(0,1);
  if(e.key==="ArrowLeft"||e.key==="a") setDir(-1,0);
  if(e.key==="ArrowRight"||e.key==="d") setDir(1,0);
});

// swipe
let sx,sy;
canvas.addEventListener("touchstart",e=>{
  sx=e.touches[0].clientX;
  sy=e.touches[0].clientY;
});

canvas.addEventListener("touchend",e=>{
  let dx=e.changedTouches[0].clientX-sx;
  let dy=e.changedTouches[0].clientY-sy;

  if(Math.abs(dx)>Math.abs(dy)){
    setDir(dx>0?1:-1,0);
  } else {
    setDir(0,dy>0?1:-1);
  }
});

init();
requestAnimationFrame(gameLoop);
</script>

</body>
</html>
