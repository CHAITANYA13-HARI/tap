<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  margin:0;
  background:#222;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:monospace;
}

#frame{
  background:#555;
  padding:20px;
  border-radius:20px;
  box-shadow:0 0 30px #000 inset;
}

canvas{
  background:#9bbc0f;
  border:10px solid #0f380f;
  display:block;
}
</style>
</head>
<body>

<div id="frame">
  <canvas id="game" width="300" height="300"></canvas>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const size = 15;
const tiles = 20;

let snake, dx, dy, food, score;
let state = "start"; // start, playing, gameover
let speed = 120;
let loop;

// ===== INIT =====
function init(){
  snake = [{x:10,y:10}];
  dx = 1;
  dy = 0;
  score = 0;
  speed = 120;
  food = spawnFood();
  state = "playing";

  clearInterval(loop);
  loop = setInterval(gameLoop, speed);
}

// ===== FOOD =====
function spawnFood(){
  let newFood;
  while(true){
    newFood = {
      x: Math.floor(Math.random()*tiles),
      y: Math.floor(Math.random()*tiles)
    };
    let onSnake = snake.some(s => s.x===newFood.x && s.y===newFood.y);
    if(!onSnake) return newFood;
  }
}

// ===== UPDATE =====
function update(){
  let head = { x: snake[0].x + dx, y: snake[0].y + dy };

  // wrap-around edges
  if(head.x < 0) head.x = tiles - 1;
  if(head.x >= tiles) head.x = 0;
  if(head.y < 0) head.y = tiles - 1;
  if(head.y >= tiles) head.y = 0;

  // self collision → game over
  for(let s of snake){
    if(s.x === head.x && s.y === head.y){
      state = "gameover";
      clearInterval(loop);
      return;
    }
  }

  snake.unshift(head);

  if(head.x === food.x && head.y === food.y){
    score++;
    food = spawnFood();

    // speed ramp
    if(speed > 70){
      speed -= 3;
      clearInterval(loop);
      loop = setInterval(gameLoop, speed);
    }
  } else {
    snake.pop();
  }
}

// ===== DRAW =====
function draw(){
  // background
  ctx.fillStyle="#9bbc0f";
  ctx.fillRect(0,0,300,300);

  if(state === "start"){
    ctx.fillStyle="#0f380f";
    ctx.font="16px monospace";
    ctx.fillText("NOKIA SNAKE", 75, 120);
    ctx.font="12px monospace";
    ctx.fillText("Press any key to start", 65, 150);
    return;
  }

  // snake
  ctx.fillStyle="#0f380f";
  snake.forEach(s=>{
    ctx.fillRect(s.x*size, s.y*size, size-2, size-2);
  });

  // food
  ctx.fillStyle="#306230";
  ctx.fillRect(food.x*size, food.y*size, size-2, size-2);

  // score
  ctx.fillStyle="#0f380f";
  ctx.font="14px monospace";
  ctx.fillText("Score: "+score, 5, 15);

  // game over
  if(state === "gameover"){
    ctx.fillStyle="rgba(155,188,15,0.9)";
    ctx.fillRect(0,100,300,100);

    ctx.fillStyle="#0f380f";
    ctx.font="16px monospace";
    ctx.fillText("GAME OVER", 85, 140);

    ctx.font="12px monospace";
    ctx.fillText("Score: "+score, 100, 160);
    ctx.fillText("Press any key", 75, 180);
  }
}

// ===== LOOP =====
function gameLoop(){
  if(state === "playing") update();
  draw();
}

// ===== CONTROLS =====
document.addEventListener("keydown", e=>{
  if(state === "start" || state === "gameover"){
    init();
    return;
  }

  if(e.key==="ArrowUp" && dy===0){ dx=0; dy=-1; }
  if(e.key==="ArrowDown" && dy===0){ dx=0; dy=1; }
  if(e.key==="ArrowLeft" && dx===0){ dx=-1; dy=0; }
  if(e.key==="ArrowRight" && dx===0){ dx=1; dy=0; }
});

// ===== START SCREEN =====
draw();
</script>

</body>
</html>
